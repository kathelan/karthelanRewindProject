apiVersion: apps/v1
kind: Deployment
metadata:
  name: soap-service
  namespace: kathelan-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soap-service
  template:
    metadata:
      labels:
        app: soap-service
    spec:
      containers:
        - name: soap-service
          image: quay.io/kathelan/kathelan-soap-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: soap-service
  namespace: kathelan-dev
spec:
  selector:
    app: soap-service
  ports:
    - port: 8080
      targetPort: 8080
