apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kathelan-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: quay.io/kathelan/kathelan-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: local
            - name: SOAP_CLIENT_URL
              value: http://soap-service:8080/ws
            - name: SOAP_CLIENT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: soap-credentials
                  key: username
            - name: SOAP_CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soap-credentials
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kathelan-dev
spec:
  selector:
    app: auth-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: auth-service
  namespace: kathelan-dev
spec:
  to:
    kind: Service
    name: auth-service
  port:
    targetPort: 8082
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
