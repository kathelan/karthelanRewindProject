# ─── Docker Compose PostgreSQL (port 5433) ───────────────────────────────────
# Start before running JPA performance tests:
#   docker-compose -f db-performance/docker-compose.yml up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/perf_test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Drop and recreate schema on every test run — ensures clean state
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Batch inserts — used by saveAll() in phase 8
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Hibernate statistics — used by N+1 phase to count SQL statements
spring.jpa.properties.hibernate.generate_statistics=true

# Slow query log — logs queries exceeding threshold to org.hibernate.SQL_SLOW (WARN)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=20
