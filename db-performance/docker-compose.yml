version: '3.8'

services:
  postgres-perf:
    image: postgres:16-alpine
    container_name: postgres-perf
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: perf_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    command: >
      postgres
        -c log_min_duration_statement=20
        -c log_destination=stderr
        -c logging_collector=off
    volumes:
      - postgres_perf_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test -d perf_test" ]
      interval: 5s
      timeout: 5s
      retries: 5

  oracle-perf:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-perf
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: test
    volumes:
      - ./oracle-init:/docker-entrypoint-initdb.d
      - oracle_perf_data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 15s
      timeout: 30s
      retries: 20
      start_period: 120s

volumes:
  postgres_perf_data:
  oracle_perf_data: